services:
  - type: web
    name: eretail-combined
    runtime: node
    rootDir: .
    buildCommand: npm ci --include=dev
    startCommand: npm run start:all
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: API_PORT
        value: "5050"

  - type: web
    name: eretail-api
    runtime: node
    rootDir: .
    buildCommand: npm ci --include=dev && npm run build --workspace apps/api
    startCommand: npm run start:api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: WEB_ORIGIN_HOST
        fromService:
          type: web
          name: eretail-web
          envVarKey: RENDER_EXTERNAL_HOSTNAME

  - type: web
    name: eretail-web
    runtime: node
    rootDir: .
    buildCommand: npm ci --include=dev && npm run build --workspace apps/web
    startCommand: npm run start:web
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NEXT_PUBLIC_API_HOST
        fromService:
          type: web
          name: eretail-api
          envVarKey: RENDER_EXTERNAL_HOSTNAME
